apiVersion: v1
kind: Service
metadata:
  name: echoerror
  labels:
    app: echoerror
    component: server
spec:
  selector:
    app: echoerror
    component: server
  ports:
    - name: unmeshed
      port: {{ .Values.server.unmeshedPort }}
      targetPort: unmeshed
      protocol: TCP
    - name: meshed
      port: {{ .Values.server.meshedPort }}
      targetPort: meshed
      protocol: TCP
